<!doctype html>
<html>
  <head>
    <style>
      body {
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
      }

      .parent {
        background-color: white;
        width: 200px;
        height: 50px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-radius: 5px;
      }

      button {
        border: none;
        background: none;
        font-size: 25px;
        color: green;
        cursor: pointer;
        font-weight: bold;
      }

      span {
        color: green;
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="parent">
      <button onclick="decrease()">-</button>
      <span id="content">ADD</span>
      <button onclick="increase()">+</button>
    </div>

    <script>
      let count = 0;
      let content = document.getElementById("content");

      function increase() {
        count++;
        content.textContent = count;
      }

      function decrease() {
        if (count > 0) {
          count--;
          if (count == 0) {
            content.textContent = "ADD";
          } else {
            content.textContent = count;
          }
        }
      }
    </script>
  </body>
</html>
